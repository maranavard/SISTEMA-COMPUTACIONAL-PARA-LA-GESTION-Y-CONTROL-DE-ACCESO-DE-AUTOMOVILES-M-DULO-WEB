{% extends 'base.html' %}

{% block body_class %}visitantes-page{% endblock %}

{% block content %}
<section class="visitantes-screen">
  <div class="visitantes-hero">
    <img class="visitantes-hero-logo" src="{{ url_for('static', filename='imagenes/ESCUDO COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
    <div class="visitantes-hero-actions">
      <a class="visitantes-pill visitantes-pill-active" href="{{ url_for('main.dashboard') }}">Panel de Control</a>
    </div>
  </div>

  <div class="visitantes-register-card">
    <h2>Formulario de Registro de visitante</h2>
    <form method="post" action="{{ url_for('visitantes.create_item') }}" class="visitantes-register-form">
      <input name="nombres" type="text" placeholder="Nombre" required />
      <input name="apellidos" type="text" placeholder="Apellido" required />
      <input name="numero_identificacion" type="text" placeholder="No. Identificación" inputmode="numeric" pattern="[0-9]{6,12}" title="Solo números, entre 6 y 12 dígitos" required />
      <select name="area_destino" required>
        <option value="" selected disabled>Selecciona Area Destino</option>
        {% for area in areas_destino %}
        <option value="{{ area }}">{{ area }}</option>
        {% endfor %}
      </select>
      <input name="motivo_visita" type="text" placeholder="Motivo de visita" required />
      <input name="placa" type="text" placeholder="No. Placa" />
      <label class="form-field-label" for="visitante-fecha-registro">Fecha y hora del Registro</label>
      <input id="visitante-fecha-registro" name="fecha_hora_registro" type="datetime-local" required />
      <label class="form-field-label" for="visitante-fecha-prevista">Fecha y hora Prevista</label>
      <input id="visitante-fecha-prevista" name="fecha_hora_prevista" type="datetime-local" required />

      <input type="hidden" name="estado" value="pendiente" />
      <button type="submit" class="visitantes-register-btn">Registrar</button>
    </form>
  </div>
</section>
{% endblock %}
