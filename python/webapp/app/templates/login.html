{% extends 'base.html' %}

{% block body_class %}login-page{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<section class="login-wrapper">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img class="login-logo-img" src="{{ url_for('static', filename='imagenes/IMAGOTIPO VERTICAL COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
      <p class="login-logo-text">Universidad de Cundinamarca</p>
    </div>

    <form method="post" action="{{ url_for('auth.login_post') }}" class="form login-form">
      <input id="username" name="username" type="text" placeholder="Nombre de usuario" required />
      <input id="password" name="password" type="password" placeholder="Contraseña" required />

      <button type="submit" class="btn-primary">Acceder</button>
      <button type="submit" class="btn-secondary" name="admin_mode" value="1">Acceder como administrador</button>

      <a class="forgot-link" href="{{ url_for('auth.forgot_password') }}">Olvido su contrasena?</a>
      <a class="forgot-link" href="{{ url_for('auth.register') }}">No tienes cuenta? Registrarme</a>
    </form>
  </div>
</section>
{% endblock %}
