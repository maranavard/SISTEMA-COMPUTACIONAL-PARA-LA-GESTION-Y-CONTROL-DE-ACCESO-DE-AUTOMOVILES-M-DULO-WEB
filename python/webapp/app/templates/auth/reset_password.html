{% extends 'base.html' %}

{% block body_class %}login-page{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<section class="login-wrapper">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img class="login-logo-img" src="{{ url_for('static', filename='imagenes/IMAGOTIPO VERTICAL COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
      <p class="login-logo-text">Nueva contraseña</p>
    </div>

    <form method="post" action="{{ url_for('auth.reset_password_post', token=token) }}" class="form login-form">
      <input id="password" name="password" type="password" placeholder="Nueva contraseña" required />
      <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirmar contraseña" required />
      <button type="submit" class="btn-primary">Restablecer contraseña</button>
      <a class="btn-link" href="{{ url_for('auth.login') }}">Volver al inicio de sesión</a>
    </form>
  </div>
</section>
{% endblock %}
