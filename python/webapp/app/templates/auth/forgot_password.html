{% extends 'base.html' %}

{% block body_class %}login-page{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<section class="login-wrapper">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img class="login-logo-img" src="{{ url_for('static', filename='imagenes/IMAGOTIPO VERTICAL COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
      <p class="login-logo-text">Recuperar contraseña</p>
    </div>

    <form method="post" action="{{ url_for('auth.forgot_password_post') }}" class="form login-form">
      <input id="email" name="email" type="email" placeholder="Correo registrado" pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" title="Ingresa un correo válido (ej: usuario@dominio.com)" required />
      <button type="submit" class="btn-primary">Enviar enlace de recuperación</button>
      <a class="btn-link" href="{{ url_for('auth.login') }}">Volver al inicio de sesión</a>
    </form>
  </div>
</section>
{% endblock %}
