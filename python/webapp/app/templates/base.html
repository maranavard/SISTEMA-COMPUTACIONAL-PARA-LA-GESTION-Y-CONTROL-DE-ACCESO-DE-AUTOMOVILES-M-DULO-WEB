<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Sistema Control Vehicular' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block header %}
  <header class="header">
    <div class="header-brand">
      <img class="header-logo" src="{{ url_for('static', filename='imagenes/ESCUDO COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
      <h1>Sistema Control Vehicular UDEC</h1>
    </div>
  </header>
  {% endblock %}

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="alerts">
          {% for category, message in messages %}
            <li class="alert {{ category }}" role="status" aria-live="polite">
              <span class="alert-text">{{ message }}</span>
              <button type="button" class="alert-close" aria-label="Cerrar aviso">×</button>
            </li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script>
    (function () {
      const alerts = document.querySelectorAll('.alerts .alert');
      if (!alerts.length) {
        return;
      }

      function hideAlert(alertElement) {
        if (!alertElement || alertElement.classList.contains('alert-hidden')) {
          return;
        }
        alertElement.classList.add('alert-hidden');
        window.setTimeout(() => {
          alertElement.remove();
          const alertList = document.querySelector('.alerts');
          if (alertList && !alertList.children.length) {
            alertList.remove();
          }
        }, 250);
      }

      alerts.forEach((alertElement) => {
        const closeBtn = alertElement.querySelector('.alert-close');
        if (closeBtn) {
          closeBtn.addEventListener('click', () => hideAlert(alertElement));
        }
      });
    })();
  </script>
</body>
</html>
