{% extends 'base.html' %}

{% block body_class %}consultas-page{% endblock %}

{% block content %}
<section class="consultas-screen">
  <div class="consultas-hero">
    <img class="consultas-hero-logo" src="{{ url_for('static', filename='imagenes/ESCUDO COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
    <div class="consultas-hero-actions consultas-hero-actions-between">
      <a class="consultas-pill" href="{{ url_for('consultas.index') }}">Consulta por Placa</a>
      <a class="consultas-pill consultas-pill-active" href="{{ url_for('main.dashboard') }}">Panel de Control</a>
    </div>
  </div>

  <section class="consultas-card consultas-edit-card">
    <h2>Editar Vehículo</h2>
    <form method="post" action="{{ url_for('consultas.guardar_edicion', item_id=item.id) }}" class="consultas-edit-form">
      <label class="form-field-label" for="edit-placa">Placa</label>
      <input id="edit-placa" name="placa" type="text" value="{{ item.placa or '' }}" required />

      <label class="form-field-label" for="edit-marca">Marca</label>
      <input id="edit-marca" name="marca" type="text" value="{{ item.marca or '' }}" />

      <label class="form-field-label" for="edit-modelo">Modelo</label>
      <input id="edit-modelo" name="modelo" type="text" value="{{ item.modelo or '' }}" />

      <label class="form-field-label" for="edit-color">Color</label>
      <input id="edit-color" name="color" type="text" value="{{ item.color or '' }}" />

      <label class="form-field-label" for="edit-tipo">Tipo de Vehículo</label>
      <select id="edit-tipo" name="tipo_vehiculo_id">
        <option value="">Seleccione tipo de vehículo</option>
        {% for tipo in tipos_vehiculo %}
        <option value="{{ tipo.id }}" {% if (item.tipo_vehiculo_id|string) == (tipo.id|string) %}selected{% endif %}>{{ tipo.nombre }}</option>
        {% endfor %}
      </select>

      <label class="form-field-label" for="edit-estado">Estado</label>
      <input id="edit-estado" name="estado" type="text" value="{{ item.estado or '' }}" />

      <h3 style="margin-top: 1rem;">Usuario asociado</h3>
      <label class="form-field-label" for="edit-user-id">Usuario (ID, nombre, correo o cédula)</label>
      <input id="edit-user-id" name="user_id" type="text" value="{{ usuario_asociado.id if usuario_asociado else (item.user_id or '') }}" />

      <label class="form-field-label" for="edit-user-nombre">Nombre</label>
      <input id="edit-user-nombre" name="user_nombre" type="text" value="{{ usuario_asociado.nombre if usuario_asociado else '' }}" />

      <label class="form-field-label" for="edit-user-apellido">Apellido</label>
      <input id="edit-user-apellido" name="user_apellido" type="text" value="{{ usuario_asociado.apellido if usuario_asociado else '' }}" />

      <label class="form-field-label" for="edit-user-email">Correo</label>
      <input id="edit-user-email" name="user_email" type="email" value="{{ usuario_asociado.email if usuario_asociado else '' }}" />

      <label class="form-field-label" for="edit-user-doc">Cédula</label>
      <input id="edit-user-doc" name="user_numero_identificacion" type="text" value="{{ usuario_asociado.numero_identificacion if usuario_asociado else '' }}" />

      <label class="form-field-label" for="edit-user-role">Rol</label>
      <select id="edit-user-role" name="user_role">
        <option value="">Seleccione rol</option>
        {% for role in editable_roles %}
        <option value="{{ role }}" {% if usuario_asociado and usuario_asociado.rol == role %}selected{% endif %}>{{ role | role_label }}</option>
        {% endfor %}
      </select>

      <label class="form-field-label" for="edit-user-estado">Estado de usuario</label>
      <select id="edit-user-estado" name="user_estado">
        <option value="">Seleccione estado</option>
        <option value="activo" {% if usuario_asociado and (usuario_asociado.estado or '') == 'activo' %}selected{% endif %}>Activo</option>
        <option value="inactivo" {% if usuario_asociado and (usuario_asociado.estado or '') == 'inactivo' %}selected{% endif %}>Inactivo</option>
      </select>

      <button type="submit" class="consultas-submit-btn">Guardar cambios</button>
    </form>
  </section>
</section>
{% endblock %}
