{% extends 'base.html' %}

{% block body_class %}conductores-page{% endblock %}

{% block content %}
<section class="conductores-screen">
  <div class="conductores-hero">
    <img class="conductores-hero-logo" src="{{ url_for('static', filename='imagenes/ESCUDO COLOR.png') }}" alt="Logo Universidad de Cundinamarca" />
    <div class="conductores-hero-actions">
      <a class="conductores-pill conductores-pill-active" href="{{ url_for('main.dashboard') }}">Panel de Control</a>
    </div>
  </div>

  <div class="conductores-register-card">
    <h2>Formulario de Registro de conductor</h2>
    <form method="post" action="{{ url_for('conductores.create_item') }}" class="conductores-register-form">
      <input name="nombre" type="text" placeholder="Nombre" required />
      <input name="apellido" type="text" placeholder="Apellido" required />
      <input name="cedula" type="text" placeholder="No. Identificación" required />
      <label class="form-field-label" for="conductor-estado">Estado</label>
      <select id="conductor-estado" name="estado" required>
        <option value="activo" selected>Estado: activo</option>
        <option value="inactivo">Estado: inactivo</option>
      </select>
      <input name="email" type="email" placeholder="Correo Electrónico" required />
      <input name="telefono" type="text" placeholder="Telefono" />
      <input name="dependencia" type="text" placeholder="Dependencia" />
      <input name="tipo" type="text" placeholder="Tipo" />

      <div class="conductores-date-row">
        <div class="date-field-group">
          <label class="form-field-label" for="conductor-fecha-vence">Fecha vence pase</label>
          <input id="conductor-fecha-vence" name="fecha_vencimiento_pase" type="date" required />
        </div>
        <div class="date-field-group">
          <label class="form-field-label" for="conductor-fecha-registro">Fecha de Registro</label>
          <input id="conductor-fecha-registro" name="fecha_registro" type="datetime-local" required />
        </div>
      </div>

      <input name="numero_pase" type="text" placeholder="No. Pase" required />
      <input name="categoria_pase" type="text" placeholder="Categoría Pase" required />
      <button type="submit" class="conductores-register-btn">Registrar</button>
    </form>
  </div>
</section>
{% endblock %}
